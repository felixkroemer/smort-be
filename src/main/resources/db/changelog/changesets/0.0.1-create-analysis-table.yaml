databaseChangeLog:
  - changeSet:
      id: 0.0.1-create-analysis-table
      author: smort-authors
      changes:
        - createTable:
            tableName: analysis
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: db_path
                  type: text
              - column:
                  name: deck_id
                  type: bigint
              - column:
                  name: deck_name
                  type: text
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false